<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot Demo | SWELL web works</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #092837; }
    p { font-size: 14px; color: #555; margin-bottom: 24px; }
    .chat-box { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 700px; display: flex; flex-direction: column; height: 70vh; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .message.bot { background: #f0f0f0; align-self: flex-start; }
    .message.user { background: #0F766E; color: #fff; align-self: flex-end; }
    .chat-input-area { display: flex; padding: 16px; border-top: 1px solid #eee; gap: 8px; }
    input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    button { background: #0F766E; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button:hover { background: #095a51; }
    a.back { font-size: 13px; color: #0F766E; text-decoration: none; margin-bottom: 16px; }
  </style>
</head>
<body>
  <a class="back" href="/">← ポートフォリオに戻る</a>
  <h1>AI Chat Demo</h1>
  <p>AWS Lambda + Amazon Bedrockで構築したチャットボットです。</p>
  <div class="chat-box">
    <div class="chat-messages" id="chat-messages">
      <div class="message bot">こんにちは！何でも聞いてください。</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="メッセージを入力...">
      <button id="chat-send">送信</button>
    </div>
  </div>
  <script>
    document.getElementById('chat-send').addEventListener('click', async () => {
      const input = document.getElementById('chat-input');
      const messages = document.getElementById('chat-messages');
      const userText = input.value.trim();
      if (!userText) return;
      messages.innerHTML += `<div class="message user">${userText}</div>`;
      input.value = '';
      const res = await fetch('https://uhdu8gkjs3.execute-api.us-east-1.amazonaws.com/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: userText })
      });
      const data = await res.json();
      const formatted = data.reply
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/#{1,3}\s?(.*?)(\n|$)/g, '<br><strong>$1</strong><br>')
        .replace(/```[\s\S]*?```/g, '')
        .replace(/---/g, '<hr>')
        .replace(/\|.*\|/g, '')
        .replace(/\n/g, '<br>');
      messages.innerHTML += `<div class="message bot">${formatted}</div>`;
      messages.scrollTop = messages.scrollHeight;
    });

    document.getElementById('chat-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('chat-send').click();
    });
  </script>
</body>
</html>
